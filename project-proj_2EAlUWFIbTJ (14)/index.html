<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architector - Visual Logic Node Editor</title>

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-color: #0f1115;
            --panel-bg: rgba(26, 26, 26, 0.85);
            --grid-color: rgba(255, 255, 255, 0.05);
            --accent-blue: #007AFF;
            --border-color: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
        }
    }

    @layer base {
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }
    }

    @layer components {
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }
        
        .btn {
            @apply px-3 py-1.5 rounded text-sm transition-colors duration-200 flex items-center justify-center gap-2 cursor-pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .btn-primary:hover {
            background: #0066d6;
        }

        .input-field {
            @apply w-full bg-black/50 border border-[#333] rounded px-3 py-1.5 text-sm focus:outline-none focus:border-[var(--accent-blue)] transition-colors;
            color: var(--text-main);
        }
    }
    
    .canvas-grid {
        background-image: 
            linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
            linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
    }

    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/geometry.js"></script>
    <script type="text/babel" src="utils/hierarchy.js"></script>
    <script type="text/babel" src="store/reducer.js"></script>
    <script type="text/babel" src="store/Store.js"></script>
    <script type="text/babel" src="components/Layer.js"></script>
    <script type="text/babel" src="components/Link.js"></script>
    <script type="text/babel" src="components/Port.js"></script>
    <script type="text/babel" src="components/NodePreview.js"></script>
    <script type="text/babel" src="components/DepthProfile.js"></script>
    <script type="text/babel" src="components/MiniMap.js"></script>
    <script type="text/babel" src="components/Node.js"></script>
    <script type="text/babel" src="components/Canvas.js"></script>
    <script type="text/babel" src="components/PropertyPanel.js"></script>
    <script type="text/babel" src="components/Toolbar.js"></script>
    <script type="text/babel" src="components/Library.js"></script>
    <script type="text/babel" src="components/AIAgentNodeContent.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
