<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Архитектура генератора КП — B2B</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 0;
  }

  .page {
    width: 1400px;
    min-height: 900px;
    margin: 40px auto;
    background: #1e293b;
    border-radius: 16px;
    padding: 40px;
    page-break-after: always;
    position: relative;
    overflow: hidden;
  }

  .page::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent, #3b82f6);
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid #334155;
  }

  .page-header .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    border-radius: 12px;
    font-size: 20px;
    font-weight: 700;
    color: white;
    background: var(--accent, #3b82f6);
    flex-shrink: 0;
  }

  .page-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #f1f5f9;
  }

  .page-header p {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .page-number {
    position: absolute;
    bottom: 20px;
    right: 40px;
    font-size: 12px;
    color: #475569;
  }

  .page-footer-left {
    position: absolute;
    bottom: 20px;
    left: 40px;
    font-size: 12px;
    color: #475569;
  }

  /* Overview page */
  .overview-svg {
    width: 100%;
    height: 720px;
    border-radius: 12px;
    background: #0f172a;
    border: 1px solid #334155;
  }

  /* Detail page */
  .detail-svg {
    width: 100%;
    height: 520px;
    border-radius: 12px;
    background: #0f172a;
    border: 1px solid #334155;
    margin-bottom: 24px;
  }

  .detail-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .detail-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    border-left: 4px solid var(--card-color, #3b82f6);
  }

  .detail-card h3 {
    font-size: 14px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 8px;
  }

  .detail-card p {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.6;
    white-space: pre-line;
  }

  .detail-card .group-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: #64748b;
    margin-bottom: 8px;
  }

  /* Links table */
  .links-section { margin-top: 24px; }
  .links-section h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #cbd5e1;
  }

  .links-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .links-table th {
    text-align: left;
    padding: 8px 12px;
    background: #0f172a;
    color: #64748b;
    font-weight: 600;
    border-bottom: 1px solid #334155;
  }

  .links-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #1e293b;
    color: #94a3b8;
  }

  .links-table tr:hover td { background: rgba(255,255,255,0.02); }

  .color-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    padding: 12px 16px;
    background: #0f172a;
    border-radius: 8px;
    font-size: 12px;
    color: #64748b;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 32px; height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    flex: 1;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-card .number {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent, #3b82f6);
  }

  .stat-card .label {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }

  @media print {
    body { background: white; color: #1e293b; }
    .page {
      margin: 0;
      border-radius: 0;
      background: white;
      box-shadow: none;
      width: 100%;
      padding: 30px;
    }
    .page::before { display: none; }
    .overview-svg, .detail-svg { background: #f8fafc; border-color: #e2e8f0; }
    .detail-card { background: #f8fafc; border-color: #e2e8f0; }
    .stat-card { background: #f8fafc; border-color: #e2e8f0; }
    .legend { background: #f8fafc; }
    .page-header h1 { color: #1e293b; }
    .page-header p { color: #64748b; }
    .page-number, .page-footer-left { color: #94a3b8; }
    .links-table th { background: #f1f5f9; color: #475569; }
    .links-table td { color: #475569; }
    .detail-card h3 { color: #1e293b; }
    .detail-card p { color: #475569; }
  }
</style>

// ─── SVG RENDERER ─────────────────────────────────────────────

function getPortPos(port) {
  const node = DATA.nodes[port.nodeId];
  if (!node) return { x: 0, y: 0 };
  const { x, y } = node.position;
  const { w, h } = node.size;
  switch (port.edge) {
    case 'left':   return { x: x, y: y + h * port.position };
    case 'right':  return { x: x + w, y: y + h * port.position };
    case 'top':    return { x: x + w * port.position, y: y };
    case 'bottom': return { x: x + w * port.position, y: y + h };
    default:       return { x: x, y: y };
  }
}

function getControlOffset(edge, dist) {
  const d = Math.min(Math.max(dist * 0.4, 60), 300);
  switch (edge) {
    case 'left':   return { dx: -d, dy: 0 };
    case 'right':  return { dx: d, dy: 0 };
    case 'top':    return { dx: 0, dy: -d };
    case 'bottom': return { dx: 0, dy: d };
    default:       return { dx: d, dy: 0 };
  }
}

function renderSVG(containerId, viewBox, opts = {}) {
  const { showLabels = false, highlightLayer = null } = opts;
  const container = document.getElementById(containerId);

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" class="${opts.className || 'overview-svg'}" preserveAspectRatio="xMidYMid meet">`;
  svg += `<defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#64748b">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>`;

  // Layers
  for (const layer of Object.values(DATA.layers)) {
    const dim = (highlightLayer && layer.id !== highlightLayer) ? 0.15 : 1;
    const { x, y } = layer.position;
    const { w, h } = layer.size;
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="16" fill="${layer.color}" fill-opacity="${0.08 * dim}" stroke="${layer.color}" stroke-opacity="${0.4 * dim}" stroke-width="2" stroke-dasharray="8 4"/>`;
    svg += `<text x="${x + 16}" y="${y + 28}" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="${layer.color}" fill-opacity="${0.7 * dim}">${escSvg(layer.name)}</text>`;
  }

  // Links
  for (const link of DATA.links) {
    const sp = DATA.ports[link.sourcePortId];
    const tp = DATA.ports[link.targetPortId];
    if (!sp || !tp) continue;
    const src = getPortPos(sp);
    const tgt = getPortPos(tp);
    const dist = Math.sqrt((tgt.x - src.x) ** 2 + (tgt.y - src.y) ** 2);
    const co1 = getControlOffset(sp.edge, dist);
    const co2 = getControlOffset(tp.edge, dist);

    const dim = highlightLayer ? 0.4 : 1;
    svg += `<path d="M${src.x},${src.y} C${src.x + co1.dx},${src.y + co1.dy} ${tgt.x + co2.dx},${tgt.y + co2.dy} ${tgt.x},${tgt.y}" fill="none" stroke="${link.color}" stroke-width="2.5" stroke-opacity="${0.7 * dim}" marker-end="url(#arrowhead)"/>`;

    if (showLabels) {
      const mx = (src.x + tgt.x) / 2;
      const my = (src.y + tgt.y) / 2 - 8;
      svg += `<text x="${mx}" y="${my}" font-family="Inter, sans-serif" font-size="10" fill="${link.color}" fill-opacity="0.6" text-anchor="middle">${escSvg(link.name)}</text>`;
    }
  }

  // Nodes
  for (const node of Object.values(DATA.nodes)) {
    const dim = (highlightLayer && node.parentId !== highlightLayer) ? 0.2 : 1;
    const { x, y } = node.position;
    const { w, h } = node.size;
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="${node.color}" fill-opacity="${0.9 * dim}" stroke="${lighten(node.color, 30)}" stroke-opacity="${0.5 * dim}" stroke-width="1.5" filter="url(#shadow)"/>`;
    // Title bar
    svg += `<rect x="${x}" y="${y}" width="${w}" height="36" rx="10" fill="rgba(255,255,255,0.08)" fill-opacity="${dim}"/>`;
    svg += `<text x="${x + 14}" y="${y + 24}" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" fill-opacity="${0.95 * dim}">${escSvg(truncate(node.name, 40))}</text>`;

    // Content lines
    if (dim > 0.5) {
      const lines = node.content.split('\n').slice(0, 5);
      lines.forEach((line, i) => {
        svg += `<text x="${x + 14}" y="${y + 54 + i * 16}" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.5">${escSvg(truncate(line, 55))}</text>`;
      });
    }
  }

  // Ports
  for (const port of Object.values(DATA.ports)) {
    const pos = getPortPos(port);
    const dim = highlightLayer ? 0.5 : 1;
    svg += `<circle cx="${pos.x}" cy="${pos.y}" r="5" fill="${port.color}" fill-opacity="${0.8 * dim}" stroke="white" stroke-width="1.5" stroke-opacity="${0.3 * dim}"/>`;
  }

  svg += `</svg>`;
  container.innerHTML = svg;
}

function escSvg(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
function lighten(hex, pct) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + pct);
  const g = Math.min(255, ((num >> 8) & 0xff) + pct);
  const b = Math.min(255, (num & 0xff) + pct);
  return `rgb(${r},${g},${b})`;
}
